apiVersion: v1
kind: Service
metadata:
  name: {{ include "xerj.fullname" . }}
  labels:
    {{- include "xerj.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.esCompatPort }}
      targetPort: es-compat
      name: es-compat
    - port: {{ .Values.service.nativePort }}
      targetPort: native
      name: native
    - port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      name: grpc
  selector:
    {{- include "xerj.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "xerj.fullname" . }}-headless
  labels:
    {{- include "xerj.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.service.esCompatPort }}
      targetPort: es-compat
      name: es-compat
  selector:
    {{- include "xerj.selectorLabels" . | nindent 4 }}
