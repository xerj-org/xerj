name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege by default for an OSS repo; jobs opt into more if needed.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Format + Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            engine/target
          key: ci-lint-cargo-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: ci-lint-cargo-

      - name: rustfmt (check)
        working-directory: engine
        run: cargo fmt --all --check

      - name: clippy (deny warnings)
        working-directory: engine
        run: cargo clippy --workspace --all-targets -- -D warnings

  build-test:
    name: Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            engine/target
          key: ci-cargo-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: ci-cargo-

      - name: Build (release)
        working-directory: engine
        run: cargo build --release --workspace

      - name: Unit + integration tests
        working-directory: engine
        run: cargo test --release --workspace -- --test-threads=2

  api-checks:
    name: API smoke + liveness + benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            engine/target
          key: ci-cargo-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: ci-cargo-

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build xerj (release)
        working-directory: engine
        run: cargo build --release -p xerj-server

      # Boots the binary, seeds a real corpus, then gates on:
      #   smoke suite (61/61), API liveness (no 5xx across the read surface),
      #   and prints the hot-path benchmark. Deterministic — no model needed.
      - name: API smoke + liveness + benchmark
        run: bash demo/playbooks/ci-check.sh

  conformance:
    name: ES-compat YAML conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            engine/target
          key: ci-cargo-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: ci-cargo-

      - name: Build server + conformance runner (release)
        working-directory: engine
        run: cargo build --release -p xerj-server -p es-yaml-runner

      # rc.3 regression: the shipped xerj.default.toml failed to parse
      # (`unknown field hnsw_offload_threshold`) so the documented
      # `--config` invocation was a dead boot. Boot the real binary with
      # the real shipped file and require it to answer HTTP before the
      # conformance server takes port 9200. Runs from a temp dir because
      # the shipped config uses a relative `data_dir = "./data"`, and
      # accepts any HTTP status (auth is enabled in the shipped config,
      # so an unauthenticated probe legitimately gets 401).
      - name: Shipped default config boots (rc.3 regression)
        run: |
          set -euo pipefail
          SMOKE="$(mktemp -d)"
          cd "$SMOKE"
          "$GITHUB_WORKSPACE/engine/target/release/xerj" \
            --config "$GITHUB_WORKSPACE/engine/xerj.default.toml" > server.log 2>&1 &
          SMOKE_PID=$!
          up=""
          for _ in $(seq 1 80); do
            code="$(curl -s -m1 -o /dev/null -w '%{http_code}' localhost:9200/ || true)"
            if [ "$code" != "000" ] && [ -n "$code" ]; then up="$code"; break; fi
            if ! kill -0 "$SMOKE_PID" 2>/dev/null; then break; fi
            sleep 0.25
          done
          if [ -z "$up" ]; then
            echo "xerj failed to boot with the shipped xerj.default.toml"
            cat server.log
            exit 1
          fi
          echo "shipped-config boot OK (HTTP $up)"
          kill "$SMOKE_PID" 2>/dev/null || true
          wait "$SMOKE_PID" 2>/dev/null || true

      - name: Boot xerj
        working-directory: engine
        run: |
          set -euo pipefail
          DATA="$(mktemp -d)"
          echo "XERJ_DATA=$DATA" >> "$GITHUB_ENV"
          ./target/release/xerj --insecure --data-dir "$DATA" > "$DATA/server.log" 2>&1 &
          echo "XERJ_PID=$!" >> "$GITHUB_ENV"
          for _ in $(seq 1 80); do
            if curl -fs -m1 localhost:9200/_cluster/health >/dev/null 2>&1; then
              echo "xerj is up"; exit 0
            fi
            sleep 0.25
          done
          echo "xerj failed to become healthy"; cat "$DATA/server.log"; exit 1

      # The runner exits non-zero if any case fails. The 3 skipped cases do not
      # count as failures, so a clean run gates the PR at 1326 passing / 0 failing.
      - name: Run ES-compat YAML suite (0 failures required)
        working-directory: engine
        run: cargo run --release -p es-yaml-runner -- --dir tests/es-compat-yaml/yaml

      - name: Server log on failure
        if: failure()
        run: cat "$XERJ_DATA/server.log" || true

      - name: Stop xerj
        if: always()
        run: kill "${XERJ_PID:-}" 2>/dev/null || true
