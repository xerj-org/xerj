version: "3.9"

services:
  xerj:
    build: .
    container_name: xerj
    restart: unless-stopped
    ports:
      - "8080:8080"   # Native REST API
      - "9200:9200"   # Elasticsearch-compatible REST API
      - "8081:8081"   # gRPC API
    volumes:
      - xerj-data:/data
    environment:
      XERJ_LOG: info
    command: ["--data-dir", "/data"]

volumes:
  xerj-data:
    driver: local
