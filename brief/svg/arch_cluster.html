
<svg class="arch-svg" viewBox="0 0 1400 580" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:auto;">
  <defs>
    <style>
      .lbl    { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.08em; fill: currentColor; }
      .lbl-s  { font-family: 'IBM Plex Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.10em; fill: currentColor; opacity: 0.62; }
      .lbl-x  { font-family: 'IBM Plex Sans', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 0.18em; fill: currentColor; opacity: 0.48; text-transform: uppercase; }
      .lbl-a  { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.10em; fill: #ffc400; }
      .lbl-m  { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.04em; fill: currentColor; opacity: 0.55; }
      .ln     { stroke: currentColor; stroke-width: 1; fill: none; stroke-linecap: square; }
      .ln-a   { stroke: #ffc400; stroke-width: 1; fill: none; stroke-linecap: square; }
      .ln-d   { stroke: currentColor; stroke-width: 1; fill: none; stroke-linecap: square; stroke-dasharray: 3 4; opacity: 0.5; }
      .bx     { stroke: currentColor; stroke-width: 1; fill: none; }
      .bx-a   { stroke: #ffc400; stroke-width: 1; fill: none; }
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="1399" height="579" class="bx" opacity="0.18"/>

  <!-- Header -->
  <text x="40"   y="42" class="lbl-x">CLIENTS</text>
  <text x="700"  y="42" class="lbl-x">XERJ NODES · IDENTICAL BINARIES</text>
  <line x1="40" y1="56" x2="1360" y2="56" class="ln" opacity="0.30"/>

  <!-- clients -->
  <rect x="40" y="80" width="240" height="80" class="bx"/>
  <text x="60" y="112" class="lbl">CLIENTS</text>
  <text x="60" y="132" class="lbl-s">ES SDKs · agents · UI</text>
  <text x="60" y="150" class="lbl-m">load-balanced over nodes</text>

  <!-- LB / data path -->
  <line x1="280" y1="120" x2="380" y2="120" class="ln-a"/>
  <polyline points="372,110 382,120 372,130" class="ln-a"/>

  <!-- 3 nodes arranged in triangle/raster -->
  <g>
    <!-- Node 1 (Leader) -->
    <rect x="380" y="80" width="280" height="180" class="bx-a"/>
    <text x="400" y="110" class="lbl-a">NODE A · LEADER</text>
    <text x="400" y="130" class="lbl-s">data plane · port :9200</text>

    <!-- inner sub-blocks -->
    <rect x="400" y="148" width="240" height="32" class="bx" opacity="0.85"/>
    <text x="412" y="170" class="lbl-s">RAFT · LEADER</text>

    <rect x="400" y="188" width="240" height="28" class="bx" opacity="0.85"/>
    <text x="412" y="207" class="lbl-s">METADATA STORE</text>

    <rect x="400" y="222" width="240" height="28" class="bx" opacity="0.85"/>
    <text x="412" y="241" class="lbl-s">DATA · INDICES · SHARDS</text>
  </g>

  <g>
    <!-- Node 2 (Follower) -->
    <rect x="700" y="80" width="280" height="180" class="bx"/>
    <text x="720" y="110" class="lbl">NODE B · FOLLOWER</text>
    <text x="720" y="130" class="lbl-s">data plane · port :9200</text>

    <rect x="720" y="148" width="240" height="32" class="bx" opacity="0.85"/>
    <text x="732" y="170" class="lbl-s">RAFT · FOLLOWER</text>

    <rect x="720" y="188" width="240" height="28" class="bx" opacity="0.85"/>
    <text x="732" y="207" class="lbl-s">METADATA STORE</text>

    <rect x="720" y="222" width="240" height="28" class="bx" opacity="0.85"/>
    <text x="732" y="241" class="lbl-s">DATA · INDICES · SHARDS</text>
  </g>

  <g>
    <!-- Node 3 (Follower) -->
    <rect x="1020" y="80" width="280" height="180" class="bx"/>
    <text x="1040" y="110" class="lbl">NODE C · FOLLOWER</text>
    <text x="1040" y="130" class="lbl-s">data plane · port :9200</text>

    <rect x="1040" y="148" width="240" height="32" class="bx" opacity="0.85"/>
    <text x="1052" y="170" class="lbl-s">RAFT · FOLLOWER</text>

    <rect x="1040" y="188" width="240" height="28" class="bx" opacity="0.85"/>
    <text x="1052" y="207" class="lbl-s">METADATA STORE</text>

    <rect x="1040" y="222" width="240" height="28" class="bx" opacity="0.85"/>
    <text x="1052" y="241" class="lbl-s">DATA · INDICES · SHARDS</text>
  </g>

  <!-- Raft links between nodes (yellow) -->
  <line x1="660" y1="164" x2="700" y2="164" class="ln-a"/>
  <polyline points="692,154 702,164 692,174" class="ln-a"/>
  <line x1="980" y1="164" x2="1020" y2="164" class="ln-a"/>
  <polyline points="1012,154 1022,164 1012,174" class="ln-a"/>
  <!-- and back-edges -->
  <line x1="660" y1="180" x2="1020" y2="180" class="ln-a" stroke-dasharray="2 4" opacity="0.5"/>

  <!-- gossip dashed underneath -->
  <line x1="540" y1="270" x2="1160" y2="270" class="ln-d"/>
  <text x="700" y="290" class="lbl-x">HEARTBEAT · GOSSIP · MEMBERSHIP</text>

  <!-- lower half: data replication -->
  <line x1="40" y1="340" x2="1360" y2="340" class="ln" opacity="0.30"/>
  <text x="40" y="368" class="lbl-x">DATA REPLICATION · PER-INDEX · NOT RAFT</text>

  <rect x="40" y="380" width="280" height="100" class="bx"/>
  <text x="60" y="412" class="lbl">CLIENT WRITE</text>
  <text x="60" y="432" class="lbl-s">_bulk · NDJSON · OTLP</text>
  <text x="60" y="450" class="lbl-m">routed to primary shard</text>
  <text x="60" y="468" class="lbl-m">based on metadata</text>

  <line x1="320" y1="425" x2="380" y2="425" class="ln"/>
  <polyline points="372,415 382,425 372,435" class="ln"/>

  <rect x="380" y="380" width="280" height="100" class="bx-a"/>
  <text x="400" y="412" class="lbl-a">PRIMARY SHARD</text>
  <text x="400" y="432" class="lbl-s">on owning node</text>
  <text x="400" y="450" class="lbl-m">WAL fsync</text>
  <text x="400" y="468" class="lbl-m">2xx after durable</text>

  <line x1="660" y1="425" x2="720" y2="425" class="ln"/>
  <polyline points="712,415 722,425 712,435" class="ln"/>

  <rect x="720" y="380" width="280" height="100" class="bx"/>
  <text x="740" y="412" class="lbl">REPLICA SHARDS</text>
  <text x="740" y="432" class="lbl-s">N copies · sync</text>
  <text x="740" y="450" class="lbl-m">quorum acknowledgement</text>
  <text x="740" y="468" class="lbl-m">read-path continuity</text>

  <line x1="1000" y1="425" x2="1060" y2="425" class="ln"/>
  <polyline points="1052,415 1062,425 1052,435" class="ln"/>

  <rect x="1060" y="380" width="280" height="100" class="bx"/>
  <text x="1080" y="412" class="lbl">FAILURE · FAILOVER</text>
  <text x="1080" y="432" class="lbl-s">replica promotes</text>
  <text x="1080" y="450" class="lbl-m">in-flight reads finish</text>
  <text x="1080" y="468" class="lbl-m">new writes hit new primary</text>

  <text x="40" y="555" class="lbl-x">METADATA · RAFT · CONSENSUS    ·    DATA · PER-INDEX REPLICATION · NO CO-PROCESS</text>
</svg>
