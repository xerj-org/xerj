
<svg class="arch-svg" viewBox="0 0 1400 700" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:auto;">
  <defs>
    <style>
      .lbl    { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.08em; fill: currentColor; }
      .lbl-s  { font-family: 'IBM Plex Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.10em; fill: currentColor; opacity: 0.62; }
      .lbl-x  { font-family: 'IBM Plex Sans', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 0.18em; fill: currentColor; opacity: 0.48; text-transform: uppercase; }
      .lbl-a  { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.10em; fill: #ffc400; }
      .lbl-h  { font-family: 'Big Shoulders Display','IBM Plex Sans',sans-serif; font-size: 18px; font-weight: 900; letter-spacing: 0.10em; fill: currentColor; text-transform: uppercase; }
      .ln     { stroke: currentColor; stroke-width: 1; fill: none; stroke-linecap: square; }
      .ln-a   { stroke: #ffc400; stroke-width: 1; fill: none; stroke-linecap: square; }
      .ln-d   { stroke: currentColor; stroke-width: 1; fill: none; stroke-linecap: square; stroke-dasharray: 3 4; opacity: 0.5; }
      .bx     { stroke: currentColor; stroke-width: 1; fill: none; }
      .bx-a   { stroke: #ffc400; stroke-width: 1; fill: none; }
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="1399" height="699" class="bx" opacity="0.18"/>

  <!-- ===== TOP: ELASTICSEARCH HEAP ZONES ===== -->
  <text x="40" y="42" class="lbl-h">ELASTICSEARCH · JVM HEAP REGIME</text>
  <line x1="40" y1="58" x2="1360" y2="58" class="ln" opacity="0.35"/>

  <!-- horizontal bar diagram of heap pressure -->
  <text x="40" y="92" class="lbl-x">HEAP PRESSURE  →  GC THRASH  →  CIRCUIT BREAKER  →  OOM</text>

  <!-- bar background -->
  <rect x="40" y="110" width="1280" height="46" class="bx"/>

  <!-- zones -->
  <line x1="680"  y1="110" x2="680"  y2="156" class="ln"/>
  <line x1="900"  y1="110" x2="900"  y2="156" class="ln"/>
  <line x1="1120" y1="110" x2="1120" y2="156" class="ln-a"/>
  <line x1="1240" y1="110" x2="1240" y2="156" class="ln-a"/>

  <text x="60"   y="138" class="lbl-s">SAWTOOTH · HEALTHY</text>
  <text x="700"  y="138" class="lbl-s">RISING · SUSTAINED</text>
  <text x="920"  y="138" class="lbl-s">FLATLINE · GC THRASH</text>
  <text x="1140" y="138" class="lbl-a">BREAKER 95%</text>
  <text x="1255" y="138" class="lbl-a">OOM</text>

  <!-- percent ticks under bar -->
  <text x="40"   y="178" class="lbl-x">0 %</text>
  <text x="668"  y="178" class="lbl-x">50 %</text>
  <text x="888"  y="178" class="lbl-x">75 %</text>
  <text x="1108" y="178" class="lbl-x">85 %</text>
  <text x="1228" y="178" class="lbl-x">95 %</text>
  <text x="1308" y="178" class="lbl-x">100 %</text>

  <!-- annotation -->
  <text x="40" y="210" class="lbl-x">ABOVE 31 GB · COMPRESSED OOPS LOST · USABLE HEAP HALVES</text>

  <!-- THREE FAILURE MODES -->
  <rect x="40"  y="232" width="420" height="120" class="bx"/>
  <text x="60"  y="262" class="lbl-a">STOP-THE-WORLD</text>
  <text x="60"  y="282" class="lbl-s">a major collection freezes the node</text>
  <text x="60"  y="298" class="lbl-s">tail latency multiplies under agent loops</text>
  <text x="60"  y="318" class="lbl-s">one node's pause becomes everyone's stall</text>
  <text x="60"  y="338" class="lbl-s">no GC tuning makes it deterministic</text>

  <rect x="490" y="232" width="420" height="120" class="bx"/>
  <text x="510" y="262" class="lbl-a">SHARD COST</text>
  <text x="510" y="282" class="lbl-s">each shard takes a fixed slice of heap</text>
  <text x="510" y="298" class="lbl-s">tens of thousands of small shards starve queries</text>
  <text x="510" y="318" class="lbl-s">restart triggers a recovery storm</text>
  <text x="510" y="338" class="lbl-s">field explosion bloats cluster state</text>

  <rect x="940" y="232" width="380" height="120" class="bx"/>
  <text x="960" y="262" class="lbl-a">VECTOR APPETITE</text>
  <text x="960" y="282" class="lbl-s">HNSW wants the graph in RAM</text>
  <text x="960" y="298" class="lbl-s">disk spill = order-of-magnitude latency</text>
  <text x="960" y="318" class="lbl-s">filtered-kNN can fall back to brute force</text>
  <text x="960" y="338" class="lbl-s">int8 / nibble narrow it — until you re-rank</text>

  <!-- ===== BOTTOM: XERJ RUNTIME ===== -->
  <text x="40"  y="406" class="lbl-h">XERJ · DETERMINISTIC RUSTIME</text>
  <text x="780" y="406" class="lbl-h">SAME WORKLOAD · DIFFERENT REGIME</text>
  <line x1="40" y1="422" x2="1360" y2="422" class="ln-a" opacity="0.5"/>

  <!-- properties matrix -->
  <text x="40" y="456" class="lbl-x">RUNTIME PROPERTIES</text>

  <rect x="40"  y="468" width="310" height="120" class="bx-a"/>
  <text x="60"  y="498" class="lbl-a">NO GC PAUSES</text>
  <text x="60"  y="518" class="lbl-s">no JVM, no managed heap</text>
  <text x="60"  y="534" class="lbl-s">tail set by code paths, not memory</text>
  <text x="60"  y="554" class="lbl-s">cold start: 4 ms vs ES 6.05 s</text>
  <text x="60"  y="574" class="lbl-s">p99.9 means what it says</text>

  <rect x="370" y="468" width="310" height="120" class="bx-a"/>
  <text x="390" y="498" class="lbl-a">MMAP SEGMENTS</text>
  <text x="390" y="518" class="lbl-s">OS page cache, not heap</text>
  <text x="390" y="534" class="lbl-s">no 31 GB compressed-oops cliff</text>
  <text x="390" y="554" class="lbl-s">RSS scales with corpus, not nodes</text>
  <text x="390" y="574" class="lbl-s">RSS · 1 K-vector index: 727 MB vs 2 857 MB</text>

  <rect x="700" y="468" width="310" height="120" class="bx-a"/>
  <text x="720" y="498" class="lbl-a">SHARDED MEMTABLE</text>
  <text x="720" y="518" class="lbl-s">16 in-memory shards</text>
  <text x="720" y="534" class="lbl-s">ingest scales with cores, not heap size</text>
  <text x="720" y="554" class="lbl-s">no recovery storm — WAL replay is bounded</text>
  <text x="720" y="574" class="lbl-s">5 M-doc restart preserves every batch</text>

  <rect x="1030" y="468" width="290" height="120" class="bx-a"/>
  <text x="1050" y="498" class="lbl-a">VECTOR APPETITE</text>
  <text x="1050" y="518" class="lbl-s">HNSW M=16 · ef tunable at runtime</text>
  <text x="1050" y="534" class="lbl-s">SQ8 · nibble · float32 re-rank</text>
  <text x="1050" y="554" class="lbl-s">filter goes through the planner, not around it</text>
  <text x="1050" y="574" class="lbl-s">one parameter trades recall for latency</text>

  <text x="40"  y="624" class="lbl-x">NO HEAP · NO GC · NO 31 GB CEILING</text>
  <text x="40"  y="650" class="lbl-x">NO JVM TUNING · NO STOP-THE-WORLD · NO RECOVERY STORM</text>

  <!-- footer caption -->
  <text x="40" y="690" class="lbl-x">SAME TWO-HOST WORKLOAD · MEASURED AT V1.0.0-RC.1</text>
</svg>
